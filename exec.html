  <style>
    /* ── Section shells ─────────────────────────────────────────────── */
    .exec-section {
      background: #ffffff;
      position: relative;
      overflow: hidden;
      color: #1f1f1f;
      padding: 36px 0 54px;
    }

    .exec-page-header,
    .exec-positions-shell,
    .alumni-inner {
      position: relative;
      z-index: 2;
    }

    .alumni-section {
      background: #0d0d0d;
      position: relative;
      overflow: hidden;
      color: #f0f0f0;
      padding: 68px 0 84px;
    }

    .alumni-inner {
      position: relative;
      z-index: 2;
    }

    .alumni-heading-wrap {
      margin-bottom: 2rem !important;
    }

    /* ── Exec section ─────────────────────────────────────────────── */
    .gradient-bubbles {
      position: absolute;
      inset: 0;
      background-color: #f3f0ff;
      z-index: 1;
    }

    .exec-card {
      position: relative;
      background: rgba(255,255,255,0.55);
      border: 2.5px solid rgba(180,180,220,0.35);
      border-radius: 20px;
      padding: 18px 14px;
      box-shadow: 0 8px 20px rgba(140,140,200,0.15);
      backdrop-filter: blur(14px);
      transition: all 0.3s ease;
      cursor: pointer;
      z-index: 1;
      height: 100%;
    }

    .exec-card:hover {
      background: rgba(255,255,255,0.7);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 12px 30px rgba(120,120,180,0.25);
    }

    .exec-card-img {
      border-radius: 20px;
      object-fit: cover;
      aspect-ratio: 1 / 1;
    }

    .exec-placeholder-img {
      border-radius: 20px;
      background: rgba(180,160,255,0.1);
      border: 2px solid rgba(180,160,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      color: #a78bfa;
      font-size: 3rem;
    }

    .exec-member h3 {
      color: #2a2a4a;
      font-weight: 700;
      font-size: 1.15rem;
      margin-top: 10px;
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .exec-member p {
      color: #6a6a94;
      font-size: 0.93rem;
      margin-bottom: 4px;
      line-height: 1.25;
    }

    .exec-member {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards;
      animation-delay: 0.1s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Shared modal chrome ──────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal.fade .modal-dialog {
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
      transform: translateY(-30px);
      opacity: 0;
    }

    .modal.fade.show .modal-dialog {
      transform: translateY(0);
      opacity: 1;
    }

    .modal-backdrop.show {
      backdrop-filter: blur(10px) brightness(0.9);
      background-color: rgba(230,230,255,0.6);
    }

    .wieecs-modal-content {
      overflow: hidden;
      border-radius: 14px;
      animation: fadeIn 0.3s ease-in-out;
      background: linear-gradient(145deg, #f3f4ff 0%, #ebe4ff 100%);
      border: 1px solid rgba(200,200,255,0.4);
      box-shadow: 0 12px 45px rgba(100,100,160,0.25);
    }

    .wieecs-modal-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #f1f1f1;
      border-bottom: 1px solid #ddd;
    }

    .window-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      cursor: pointer;
    }

    .window-dot:nth-child(1) { background: #ff5f57; }
    .window-dot:nth-child(2) { background: #ffbd2e; }
    .window-dot:nth-child(3) { background: #28c940; margin-right: 0; }

    .modal-top-label {
      font-size: 0.9rem;
    }

    .modal-cover-image {
      object-fit: cover;
    }

    .modal-name {
      font-size: 1.75rem;
    }

    .modal-role {
      font-size: 1.05rem;
    }

    .modal-bio {
      line-height: 1.6;
      font-size: 0.97rem;
    }

    .modal-icon-link {
      font-size: 1.35rem;
    }

    #execModal h3,
    #execModal h5,
    #execModal p {
      font-family: 'Roboto', sans-serif;
      color: #2b2b4a;
    }

    /* ── Alumni modal ─────────────────────────────────────────────── */
    .alumni-modal-left {
      background: #1a1a2e;
      min-height: 260px;
    }

    .alumni-modal-right {
      background: #12122a;
    }

    .alumni-modal-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: #a78bfa;
      font-size: 3.5rem;
    }

    #alumniModal #alumniModalName {
      color: #f0f0ff;
      font-family: 'Roboto', sans-serif;
    }

    .alumni-modal-role {
      font-size: 1.02rem;
      color: #a78bfa;
    }

    .alumni-modal-bio {
      color: #ccc;
    }

    .alumni-modal-timeline {
      list-style: none;
      padding: 12px 0 0;
      margin: 0;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .alumni-modal-timeline li {
      display: flex;
      gap: 14px;
      align-items: baseline;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 0.92rem;
      color: #ccc;
      margin-bottom: 9px;
      line-height: 1.4;
    }

    .alumni-tl-year {
      color: #a99ef8;
      font-weight: 700;
      min-width: 88px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }

    .alumni-tl-role {
      color: #d0d0ea;
    }

    /* ── Alumni section ───────────────────────────────────────────── */
    .alumni-bg-texture {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(180,120,255,0.05) 0%, transparent 50%),
        radial-gradient(circle at 85% 20%, rgba(100,160,255,0.05) 0%, transparent 40%);
      z-index: 1;
      pointer-events: none;
    }

    .alumni-title {
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-family: 'Nixie One', serif;
      color: #ffffff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .alumni-divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, #a78bfa, #818cf8);
      margin: 14px auto 18px;
      border-radius: 2px;
    }

    .alumni-subtitle {
      color: #888;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    .alumni-mobile-filter-toggle {
      margin-bottom: 14px;
    }

    .alumni-mobile-filter-toggle button {
      width: 100%;
      background: rgba(255,255,255,0.06);
      color: #f3f3f8;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 0.98rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .alumni-mobile-filter-toggle button:hover,
    .alumni-mobile-filter-toggle button:focus {
      background: rgba(167,139,250,0.1);
      border-color: rgba(167,139,250,0.4);
      outline: none;
    }

    .alumni-controls {
      display: grid;
      grid-template-columns: minmax(220px, 1.4fr) minmax(160px, 1fr) minmax(180px, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .alumni-control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .alumni-control-group label {
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 0.82rem;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
    }

    .alumni-control-group input,
    .alumni-control-group select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f3f3f8;
      border-radius: 10px;
      padding: 11px 13px;
      outline: none;
      font-family: 'Source Sans Pro', sans-serif;
      min-height: 44px;
    }

    .alumni-control-group input::placeholder {
      color: #8d8d9c;
    }

    .alumni-control-group input:focus,
    .alumni-control-group select:focus {
      border-color: rgba(167,139,250,0.55);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.12);
    }

    .alumni-empty {
      text-align: center;
      color: #a9a9b7;
      padding: 24px 0;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 1.04rem;
    }

    /* Cohort blocks */
    .alumni-cohort {
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.7s ease forwards;
    }

    .alumni-year-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .alumni-year-label {
      font-family: 'Nixie One', serif;
      font-size: 1.22rem;
      color: #c4b5fd;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .alumni-year-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(167,139,250,0.5), transparent);
    }

    /* Alumni cards */
    .alumni-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 18px;
    }

    .alumni-exec-card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(180,160,255,0.2);
      border-radius: 18px;
      padding: 16px 12px 14px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      height: 100%;
    }

    .alumni-exec-card:hover {
      background: rgba(167,139,250,0.12);
      border-color: rgba(167,139,250,0.5);
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 28px rgba(120,100,200,0.2);
    }

    .alumni-exec-card .alumni-card-img {
      width: 90%;
      max-width: 260px;
      border-radius: 16px;
      object-fit: cover;
      aspect-ratio: 1 / 1;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    .alumni-placeholder-img {
      width: 90%;
      max-width: 260px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(167,139,250,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #a78bfa;
      font-size: 3.3rem;
    }

    .alumni-exec-card h3 {
      color: #e8e8f8;
      font-weight: 700;
      font-size: 1.05rem;
      margin-top: 10px;
      margin-bottom: 3px;
      line-height: 1.25;
    }

    .alumni-exec-card p {
      color: #a99ef8;
      font-size: 0.88rem;
      margin: 0;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Mobile optimization ─────────────────────────────────────── */
    @media (max-width: 991px) {
      .alumni-controls {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 767px) {
      .exec-section {
        padding: 24px 0 36px;
      }

      .alumni-section {
        padding: 42px 0 54px;
      }

      .exec-page-header {
        margin-bottom: 1rem;
      }

      .alumni-heading-wrap {
        margin-bottom: 1.25rem !important;
      }

      .alumni-title {
        font-size: 2rem;
        letter-spacing: 0.04em;
      }

      .alumni-divider {
        margin: 10px auto 12px;
      }

      .alumni-subtitle {
        font-size: 0.78rem;
        line-height: 1.35;
        letter-spacing: 0.06em;
      }

      .alumni-controls {
        display: none;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }

      .alumni-controls.is-open {
        display: grid;
      }

      .alumni-control-group label {
        font-size: 0.72rem;
      }

      .alumni-control-group input,
      .alumni-control-group select {
        padding: 10px 12px;
        font-size: 0.95rem;
        min-height: 42px;
      }

      .alumni-cohort {
        margin-bottom: 26px;
      }

      .alumni-year-header {
        gap: 10px;

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      document.querySelectorAll(".window-dot").forEach(function(dot) {
        dot.addEventListener("click", function() {
          var target = dot.dataset.target;
          if (target) {
            $("#" + target).modal("hide");
          } else {
            $(".modal").modal("hide");
          }
        });
      });

      var toggle = document.getElementById("toggle-alumni-filters");
      var controls = document.getElementById("alumni-controls");
      var label = document.getElementById("toggle-alumni-filters-label");

      if (toggle && controls) {
        toggle.addEventListener("click", function() {
          controls.classList.toggle("is-open");
          if (label) {
            label.textContent = controls.classList.contains("is-open")
              ? "Hide filters"
              : "Show filters";
          }
        });
      }
    });
  </script>
